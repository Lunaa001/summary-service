services:
 # servicios separados y lis microservios por cada lado scar de la linea 2 a las 16, llevarlo en otro lugar 

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MODEL_API_KEY: ${MODEL_API_KEY}
      MODEL_API_BASE_URL: ${MODEL_API_BASE_URL}
      IA_MODEL: ${IA_MODEL}
      HOST: ${HOST}
      PORT: ${PORT}
      LOG_LEVEL: ${LOG_LEVEL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

volumes:
  postgres_data:
